<!DOCTYPE html>
<html>
<head>

<title>Input Aset</title>

</head>

<body>

<h2>Input Aset</h2>

<input id="nama" placeholder="Nama Aset"><br>

<select id="kategori">
<option>Elektronik</option>
<option>Furniture</option>
<option>Bangunan</option>
</select><br>

<select id="kondisi">
<option>Baik</option>
<option>Rusak Ringan</option>
<option>Rusak Berat</option>
</select><br>

<input id="lat" placeholder="Latitude"><br>
<input id="lng" placeholder="Longitude"><br>

<input id="foto" placeholder="URL Foto"><br>

<button onclick="simpan()">Simpan</button>

<script>

var api="https://script.google.com/macros/s/AKfycbxMidWBOBU5feZy_Wmx9ERkUFVEr9TvMTA2jAHDiOVYw8nFqVcaKb3Li3gVtBcDZvywaw/exec"

var sekolah=localStorage.getItem("sekolah")

function simpan(){

var nama=document.getElementById("nama").value
var kategori=document.getElementById("kategori").value
var kondisi=document.getElementById("kondisi").value
var lat=document.getElementById("lat").value
var lng=document.getElementById("lng").value
var foto=document.getElementById("foto").value

fetch(api+
"?action=addAset"+
"&sekolah="+sekolah+
"&nama="+nama+
"&kategori="+kategori+
"&kondisi="+kondisi+
"&lat="+lat+
"&lng="+lng+
"&foto="+foto)

.then(r=>r.text())
.then(res=>{

alert("Aset berhasil disimpan")

})

}

</script>

</body>
</html>
