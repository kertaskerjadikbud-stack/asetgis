<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

</head>

<body class="p-4">

<h3>Input Aset Sekolah</h3>

<input id="nama" class="form-control mb-2" placeholder="Nama Aset">

<select id="kategori" class="form-control mb-2">
<option>Elektronik</option>
<option>Furniture</option>
<option>Bangunan</option>
</select>

<select id="kondisi" class="form-control mb-2">
<option>Baik</option>
<option>Rusak Ringan</option>
<option>Rusak Berat</option>
</select>

<input id="lat" class="form-control mb-2" placeholder="Latitude">
<input id="lng" class="form-control mb-2" placeholder="Longitude">

<input id="foto" class="form-control mb-2" placeholder="URL Foto">

<button onclick="simpan()" class="btn btn-success">
Simpan
</button>

<script>

var api="API_URL"
var sekolah=localStorage.getItem("sekolah")

function simpan(){

var nama=document.getElementById("nama").value
var kategori=document.getElementById("kategori").value
var kondisi=document.getElementById("kondisi").value
var lat=document.getElementById("lat").value
var lng=document.getElementById("lng").value
var foto=document.getElementById("foto").value

fetch(api+
"?action=addAset"+
"&sekolah="+sekolah+
"&nama="+nama+
"&kategori="+kategori+
"&kondisi="+kondisi+
"&lat="+lat+
"&lng="+lng+
"&foto="+foto)

.then(r=>r.text())
.then(res=>{

alert("Aset berhasil disimpan")

})

}

</script>

</body>
</html>
