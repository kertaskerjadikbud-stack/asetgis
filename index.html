<!DOCTYPE html>
<html>
<head>

<title>Login Sistem Aset</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

</head>

<body class="login-page">

<div class="login-box">

<div class="card">

<div class="card-body login-card-body">

<p class="login-box-msg">Login Sistem Aset GIS</p>

<input id="user" class="form-control mb-2" placeholder="username">
<input id="pass" type="password" class="form-control mb-2" placeholder="password">

<button onclick="login()" class="btn btn-primary btn-block">
Login
</button>

</div>
</div>
</div>

<script>

var api="https://script.google.com/macros/s/AKfycbw3p08e4ngOY7jgErJGqLy5XOiaYJXbZPP2xFRAeuVdYizARFO_YswcCMmgOvcAf6YY1g/exec"

function login(){

var user=document.getElementById("user").value
var pass=document.getElementById("pass").value

fetch(api+"?action=login&user="+user+"&pass="+pass)
.then(r=>r.json())
.then(data=>{

if(data.status=="success"){

localStorage.setItem("role",data.role)
localStorage.setItem("sekolah",data.sekolah)

window.location="dashboard.html"

}else{

alert("Login gagal")

}

})

}

</script>

</body>
</html>
