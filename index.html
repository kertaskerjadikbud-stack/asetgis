<!DOCTYPE html>
<html>
<head>
<title>Login Sistem Aset</title>
</head>

<body>

<h2>Login Sistem Aset</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

<script>

function login(){

var user=document.getElementById("user").value
var pass=document.getElementById("pass").value

if(user=="dinas" && pass=="12345"){
localStorage.setItem("role","dinas")
window.location="dashboard.html"
}

if(user=="smp1" && pass=="12345"){
localStorage.setItem("role","sekolah")
localStorage.setItem("sekolah","SMP 1 Kota")
window.location="dashboard.html"
}

}

</script>

</body>
</html>
