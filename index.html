<input id="user" placeholder="username">
<input id="pass" type="password">

<button onclick="login()">LOGIN</button>

<script>

var api="https://script.google.com/macros/s/AKfycbyHduWXRS8xvgaQahjNne6EvgqOpF8YgkujhVr5RykEsVaaiH8MdlZH9HKWna3ftzfntQ/exec";

function login(){

fetch(api+"?action=login&username="+user.value+"&password="+pass.value)

.then(res=>res.json())
.then(data=>{

if(data.status=="success"){

localStorage.setItem("sekolah",data.sekolah);
localStorage.setItem("role",data.role);

window.location="map.html";

}else{

alert("Login gagal");

}

})

}

</script>
