<!DOCTYPE html>
<html>

<head>

<title>Peta Aset Sekolah</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

#map{
height:100vh
}

</style>

</head>

<body>

<div id="map"></div>

<script>

var api="https://script.google.com/macros/s/AKfycbxMidWBOBU5feZy_Wmx9ERkUFVEr9TvMTA2jAHDiOVYw8nFqVcaKb3Li3gVtBcDZvywaw/exec"

var role=localStorage.getItem("role")
var sekolah=localStorage.getItem("sekolah")

var map = L.map('map').setView([-0.890,119.870],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

fetch(api+"?action=getAset")
.then(res=>res.json())
.then(data=>{

data.forEach(a=>{

if(role=="sekolah" && a.sekolah!=sekolah) return

var iconColor="green"

if(a.kondisi=="Rusak Ringan") iconColor="orange"
if(a.kondisi=="Rusak Berat") iconColor="red"

var marker=L.marker([a.lat,a.lng]).addTo(map)

marker.bindPopup(

"<b>"+a.nama+"</b><br>"+
"Kategori:"+a.kategori+"<br>"+
"Kondisi:"+a.kondisi+"<br>"+
"<img src='"+a.foto+"' width='120'>"

)

})

})

</script>

</body>
</html>
